[package]
name = "frida_executable_fuzzer"
version = "0.16.0"
edition = "2021"

[lib]
name = "frida_executable_fuzzer"
crate-type = ["cdylib"]

[features]
default = ["std"]
std = []

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
debug = true

[dependencies]
libafl = { path = "../../../crates/libafl", features = [
  "std",
  "llmp_compression",
  "llmp_bind_public",
  "frida_cli",
] } #,  "llmp_small_maps", "llmp_debug"]}
libafl_bolts = { path = "../../../crates/libafl_bolts" }
frida-gum = { version = "0.17.0", features = [
  "auto-download",
  "event-sink",
  "invocation-listener",
  "script",
] }
libafl_frida = { path = "../../../crates/libafl_frida", features = ["cmplog"] }
libafl_targets = { path = "../../../crates/libafl_targets", features = [
  "sancov_cmplog",
] }
libc = "0.2.159"
mimalloc = { version = "0.1.43", default-features = false }
color-backtrace = "0.6.1"
